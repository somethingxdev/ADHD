title: FAQ
items:
  - question: Это официальный диагноз?
    answer: Это не медицинский диагноз. Для точной диагностики обратитесь к врачу.
  - question: У меня точно СДВГ?
    answer: Тест носит ознакомительный характер. Только специалист может поставить диагноз.
  - question: Курс подойдёт без диагноза?
    answer: Да, курс будет полезен всем, кто хочет лучше понять себя и развить навыки управления вниманием.
  - question: Сколько длится доступ?
    answer: Доступ к материалам курса сохраняется навсегда после покупки.
  - question: Можно ли вернуть деньги?
    answer: Да, мы предоставляем возврат в течение 14 дней, если курс вам не подошёл.
